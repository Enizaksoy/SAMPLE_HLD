<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPN Network High Level Design</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#e60000 100%);min-height:100vh;display:flex;justify-content:center;align-items:center}
#login-box{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:50px 40px;text-align:center;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lock-icon{font-size:48px;margin-bottom:20px}
#login-box h2{color:#fff;font-size:22px;font-weight:300;margin-bottom:6px}
#login-box h2 strong{font-weight:700;color:#e60000}
#login-box p{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:30px}
input[type=password]{width:100%;padding:14px 18px;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;margin-bottom:16px;transition:border-color .3s}
input[type=password]:focus{border-color:#e60000}
input[type=password]::placeholder{color:rgba(255,255,255,.3)}
button{width:100%;padding:14px;border:none;border-radius:8px;background:#e60000;color:#fff;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:background .3s}
button:hover{background:#cc0000}
.error{color:#ff6b6b;font-size:13px;margin-top:12px;display:none}
.spinner{display:none;margin:12px auto 0;width:28px;height:28px;border:3px solid rgba(255,255,255,.15);border-top-color:#e60000;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="login-box">
<div class="lock-icon">&#128274;</div>
<h2><strong>Sample</strong> HLD</h2>
<p>High Level Design &mdash; Encrypted Document</p>
<input type="password" id="pwd" placeholder="Enter password..." autofocus onkeydown="if(event.key==='Enter')unlock()">
<button onclick="unlock()">Unlock Document</button>
<div class="error" id="err">Incorrect password</div>
<div class="spinner" id="spin"></div>
</div>
<script>
async function unlock(){
 var p=document.getElementById('pwd').value;
 if(!p)return;
 document.getElementById('err').style.display='none';
 document.getElementById('spin').style.display='block';
 try{
  var b=await(await fetch('data.enc')).text();
  var r=Uint8Array.from(atob(b.trim()),function(c){return c.charCodeAt(0)});
  var s=r.slice(0,16),iv=r.slice(16,28),ct=r.slice(28);
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
  var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var d=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},k,ct);
  var h=new TextDecoder().decode(d);
  document.open();document.write(h);document.close();
 }catch(e){
  document.getElementById('spin').style.display='none';
  document.getElementById('err').style.display='block';
  document.getElementById('pwd').value='';
  document.getElementById('pwd').focus();
  setTimeout(function(){document.getElementById('err').style.display='none'},3000);
 }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPN Network High Level Design</title>
<style>
:root {
  --vf-red: #e60000;
  --vf-dark-red: #b30000;
  --bg-dark: #1a1a2e;
  --bg-card: #16213e;
  --bg-code: #0f0f23;
  --border: #2a2a4a;
  --text-primary: #e0e0e0;
  --text-secondary: #9e9e9e;
  --accent-blue: #4fc3f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg-dark);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(rgba(230,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,0,0,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridMove 20s linear infinite;
  z-index: 0;
}
@keyframes gridMove {
  0% { transform: translate(0,0); }
  100% { transform: translate(60px,60px); }
}

/* Floating orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  z-index: 0;
  animation: float 8s ease-in-out infinite;
}
.orb-1 { width: 400px; height: 400px; background: var(--vf-red); top: -100px; right: -100px; }
.orb-2 { width: 300px; height: 300px; background: var(--accent-blue); bottom: -80px; left: -80px; animation-delay: -4s; }
.orb-3 { width: 200px; height: 200px; background: #ce93d8; top: 50%; left: 60%; animation-delay: -2s; }
@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(20px, -20px) scale(1.05); }
}

/* Main container */
.login-container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  max-width: 480px;
  width: 92%;
}

/* Top badge */
.top-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: rgba(230,0,0,0.15);
  border: 1px solid rgba(230,0,0,0.3);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--vf-red);
  animation: fadeInDown 0.6s ease;
}
.top-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--vf-red);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* Login card */
.login-card {
  background: rgba(22,33,62,0.85);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.3),
    0 0 0 1px rgba(255,255,255,0.03) inset;
  animation: fadeInUp 0.5s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Lock icon */
.lock-wrap {
  width: 64px; height: 64px;
  margin: 0 auto 24px;
  background: linear-gradient(135deg, var(--vf-red), var(--vf-dark-red));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(230,0,0,0.25);
}
.lock-wrap svg { width: 28px; height: 28px; fill: #fff; }

/* Title */
.login-card h1 {
  text-align: center;
  font-size: 24px;
  font-weight: 300;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.login-card h1 strong { font-weight: 700; color: #fff; }
.login-card h1 .red { color: var(--vf-red); }
.login-card .subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

/* Separator */
.sep {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin-bottom: 28px;
}

/* Input group */
.input-group { position: relative; margin-bottom: 16px; }
.input-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.input-group input {
  width: 100%;
  padding: 14px 18px 14px 44px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-code);
  color: var(--text-primary);
  font-family: 'Cascadia Code', Consolas, 'Courier New', monospace;
  font-size: 15px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.input-group input:focus {
  border-color: var(--vf-red);
  box-shadow: 0 0 0 3px rgba(230,0,0,0.15);
}
.input-group input::placeholder { color: #555; }
.input-group .icon {
  position: absolute;
  bottom: 14px; left: 16px;
  width: 18px; height: 18px;
  fill: var(--text-secondary);
  pointer-events: none;
}

/* Button */
.btn-unlock {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--vf-red), var(--vf-dark-red));
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: transform 0.15s, box-shadow 0.3s;
  box-shadow: 0 4px 16px rgba(230,0,0,0.3);
}
.btn-unlock:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(230,0,0,0.4);
}
.btn-unlock:active { transform: translateY(0); }

/* Error */
.error {
  text-align: center;
  color: #ff6b6b;
  font-size: 13px;
  margin-top: 14px;
  display: none;
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* Spinner */
.spinner {
  display: none;
  margin: 14px auto 0;
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--vf-red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer info */
.footer-info {
  display: flex;
  justify-content: center;
  gap: 24px;
  animation: fadeInUp 0.7s ease;
}
.footer-info .tag {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #555;
  letter-spacing: 0.5px;
}
.footer-info .dot {
  width: 4px; height: 4px;
  background: var(--vf-red);
  border-radius: 50%;
  opacity: 0.5;
}

@media (max-width: 500px) {
  .login-card { padding: 36px 24px; }
  .footer-info { flex-direction: column; align-items: center; gap: 8px; }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-container">
  <div class="top-badge">AES-256 Encrypted</div>

  <div class="login-card">
    <div class="lock-wrap">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <h1><strong>Sample</strong> <span class="red">HLD</span></h1>
    <p class="subtitle">High Level Design &mdash; Protected Document</p>
    <div class="sep"></div>

    <div class="input-group">
      <label>Password</label>
      <svg class="icon" viewBox="0 0 24 24"><path d="M12.65 10a6 6 0 1 0-1.3 2H10v2h2v2h2v-2h1v-2h-2.35zM7 10a2 2 0 1 1 4 0 2 2 0 0 1-4 0z"/></svg>
      <input type="password" id="pwd" placeholder="Enter password..." autofocus
        onkeydown="if(event.key==='Enter')unlock()">
    </div>

    <button class="btn-unlock" onclick="unlock()">Unlock Document</button>
    <div class="error" id="err">Incorrect password. Try again.</div>
    <div class="spinner" id="spin"></div>
  </div>

  <div class="footer-info">
    <span class="tag"><span class="dot"></span>Client-side decryption</span>
    <span class="tag"><span class="dot"></span>Zero server storage</span>
    <span class="tag"><span class="dot"></span>PBKDF2 + AES-GCM</span>
  </div>
</div>

<script>
async function unlock(){
 var p=document.getElementById('pwd').value;
 if(!p)return;
 document.getElementById('err').style.display='none';
 document.getElementById('spin').style.display='block';
 try{
  var b=await(await fetch('data.enc')).text();
  var r=Uint8Array.from(atob(b.trim()),function(c){return c.charCodeAt(0)});
  var s=r.slice(0,16),iv=r.slice(16,28),ct=r.slice(28);
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
  var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var d=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},k,ct);
  var h=new TextDecoder().decode(d);
  document.open();document.write(h);document.close();
 }catch(e){
  document.getElementById('spin').style.display='none';
  document.getElementById('err').style.display='block';
  document.getElementById('pwd').value='';
  document.getElementById('pwd').focus();
  setTimeout(function(){document.getElementById('err').style.display='none'},3000);
 }
}
</script>
</body>
</html>
